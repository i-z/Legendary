<li class="book sub row hover id-{{id}} {{selected}}" onclick="S.entries.view({{id}})">
    <a href="javascript:">
        <span class="col icon small pad-right">
            <svg viewBox="0 0 32 32">
                <use xlink:href="#icon-book" x="0" y="0" width="32" height="32"></use>
            </svg>
        </span>
        <span>{{title}}</span>
    </a>
    <span class="col right icon small pad-width-sm">
        <a href="javascript:" title="Rename Book" onclick="return S.books.rename.prompt(event, this);" data-bookid="{{id}}">
            <svg viewBox="0 0 32 32">
                <use xlink:href="#icon-pencil" x="0" y="0" width="32" height="32"></use>
            </svg>
        </a>
    </span>
</li>
